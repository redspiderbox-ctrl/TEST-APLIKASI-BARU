<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>POS Kasir Modern - Firebase Sync</title>

  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

  <style>
    :root {
      --primary: #e63946;
      --primary-hover: #c1121f;
      --primary-glow: rgba(230, 57, 70, 0.25);
      --bg-main: #fafafa;
      --sidebar-bg: #1d3557;
      --sidebar-hover: rgba(255,255,255,0.06);
      --sidebar-active: #e63946;
      --text-dark: #0f172a;
      --text-muted: #64748b;
      --card-bg: #ffffff;
      --border: #e5e7eb;
      --success: #2d6a4f;
      --warning: #e76f51;
    }

    * { box-sizing: border-box; }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background-color: var(--bg-main);
      color: var(--text-dark);
      overflow-x: hidden;
      margin: 0;
    }

    /* ===== SCROLLBAR ===== */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

    /* ===== LOGIN SCREEN ===== */
    #login-screen {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(160deg, #1d3557 0%, #0d1b2a 50%, #1d3557 100%);
      position: relative;
      overflow: hidden;
    }
    #login-screen::before {
      content: '';
      position: absolute;
      width: 600px; height: 600px;
      background: radial-gradient(circle, var(--primary-glow) 0%, transparent 70%);
      top: -200px; right: -200px;
      animation: floatBlob 8s ease-in-out infinite;
    }
    #login-screen::after {
      content: '';
      position: absolute;
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(29,53,87,0.4) 0%, transparent 70%);
      bottom: -150px; left: -150px;
      animation: floatBlob 10s ease-in-out infinite reverse;
    }
    @keyframes floatBlob {
      0%, 100% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(30px, -20px) scale(1.05); }
    }

    .login-card {
      width: 100%; max-width: 420px;
      background: rgba(255,255,255,0.97);
      border-radius: 20px;
      padding: 48px 40px;
      box-shadow: 0 25px 50px rgba(0,0,0,0.25);
      position: relative;
      z-index: 2;
      backdrop-filter: blur(10px);
    }
    .login-logo {
      width: 72px; height: 72px;
      background: linear-gradient(135deg, var(--primary), var(--sidebar-bg));
      border-radius: 18px;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 20px;
      box-shadow: 0 8px 20px var(--primary-glow);
    }
    .login-logo i { font-size: 2rem; color: white; }

    /* ===== SIDEBAR ===== */
    #app-screen { display: none; }
    .sidebar {
      width: 270px; height: 100vh;
      position: fixed; left: 0; top: 0;
      background: var(--sidebar-bg);
      color: white; padding: 0;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      z-index: 1000;
      display: flex; flex-direction: column;
      box-shadow: 4px 0 20px rgba(0,0,0,0.1);
    }
    .sidebar-brand {
      padding: 24px 24px 20px;
      font-size: 1.4rem; font-weight: 800;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      display: flex; align-items: center; gap: 12px;
      letter-spacing: -0.5px;
    }
    .sidebar-brand-icon {
      width: 38px; height: 38px;
      background: var(--primary);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.1rem;
    }
    .sidebar-section {
      padding: 16px 16px 6px;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: rgba(255,255,255,0.35);
      font-weight: 600;
    }
    .sidebar-menu {
      margin-top: 4px; list-style: none; padding: 0; flex: 1;
      overflow-y: auto;
    }
    .sidebar-menu li {
      padding: 11px 20px; margin: 2px 10px;
      cursor: pointer; display: flex; align-items: center; gap: 14px;
      transition: 0.2s; border-radius: 10px;
      color: rgba(255,255,255,0.6);
      font-size: 0.92rem; font-weight: 500;
      border-left: none;
    }
    .sidebar-menu li i { font-size: 1.15rem; width: 22px; text-align: center; }
    .sidebar-menu li:hover { background: var(--sidebar-hover); color: white; }
    .sidebar-menu li.active {
      background: var(--primary);
      color: white;
      font-weight: 600;
      box-shadow: 0 4px 12px var(--primary-glow);
    }
    .sidebar-menu li.logout-btn { color: #f87171; margin-top: 16px; }
    .sidebar-menu li.logout-btn:hover { background: rgba(248,113,113,0.1); color: #fecaca; }
    .sidebar-footer {
      padding: 16px 20px;
      border-top: 1px solid rgba(255,255,255,0.06);
      font-size: 0.75rem;
      color: rgba(255,255,255,0.3);
      text-align: center;
    }

    /* ===== MAIN CONTENT ===== */
    .main-content { margin-left: 270px; padding: 28px 32px; min-height: 100vh; }
    .page-header { margin-bottom: 28px; }
    .page-header h2 { font-weight: 800; font-size: 1.65rem; letter-spacing: -0.5px; }
    .page-header p { color: var(--text-muted);
